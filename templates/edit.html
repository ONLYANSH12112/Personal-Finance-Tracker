<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
</head>

<body>

    <h1>Edit Transaction</h1>

    <form method="POST">

        <label>Amount</label>
        <input type="number"
               step="0.01"
               name="amount"
               value="{{ transaction[1] }}"
               required>

        <br><br>

        <label>Type</label>

        <select name="type">

            <option value="Income"
            {% if transaction[2] == 'Income' %}
            selected
            {% endif %}
            >
                Income
            </option>

            <option value="Expense"
            {% if transaction[2] == 'Expense' %}
            selected
            {% endif %}
            >
                Expense
            </option>

        </select>

        <br><br>

        <label>Description</label>

        <input type="text"
               name="description"
               value="{{ transaction[3] }}">

        <br><br>

        <button type="submit">
            Update Transaction
        </button>

    </form>

</body>

</html>
